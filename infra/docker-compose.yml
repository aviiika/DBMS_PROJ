version: '3.9'
services:
  db:
    image: postgres:16
    container_name: hospital-pm-db
    environment:
      POSTGRES_DB: hospital_pm
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
    container_name: hospital-pm-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/hospital_pm
      DB_USERNAME: hospital
      DB_PASSWORD: hospital
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
    container_name: hospital-pm-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
