spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hospital_pm}
    username: ${DB_USERNAME:hospital}
    password: ${DB_PASSWORD:hospital}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${PORT:8080}
